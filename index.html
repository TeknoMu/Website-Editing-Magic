<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editing Magic — Professional Video Editing</title>
  <meta name="description" content="Cinematic video editing, color grading, motion design — professional post-production services." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height: 100%;
      background: #000;
      color: #e0e0e0;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      z-index: 1;
      opacity: 0.22;
    }
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 2rem;
    }
    .hero {
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4.5rem, 11vw, 10rem);
      font-weight: 900;
      color: #00ff9d;
      text-shadow: 0 0 35px rgba(0, 255, 157, 0.45);
      letter-spacing: 0.06em;
      line-height: 0.92;
      margin-bottom: 1.2rem;
    }
    .subtitle {
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      font-weight: 400;
      color: #b0b0b0;
      max-width: 680px;
      margin: 0 auto;
    }
    .film-strip {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 140px;
      overflow: hidden;
      z-index: 5;
      pointer-events: none;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
    }
    .reel {
      display: flex;
      width: 300%;
      height: 100%;
      animation: scrollFilm 12s linear infinite;
    }
    .frame {
      flex: 0 0 20%;
      height: 100%;
      background: #111 center/cover no-repeat;
      border: 2px solid #2a2a2a;
      margin: 0 0.8%;
      overflow: hidden;
    }
    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.75;
      transition: opacity 0.4s;
    }
    .frame:hover img { opacity: 0.95; }
    @keyframes scrollFilm {
      0%   { transform: translateX(0);    }
      100% { transform: translateX(-33.33%); }
    }
    form {
      background: rgba(18, 18, 18, 0.75);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0, 255, 157, 0.12);
      border-radius: 16px;
      padding: 2.5rem;
      max-width: 460px;
      margin: 3.5rem auto 0;
    }
    label {
      display: block;
      margin-bottom: 0.6rem;
      font-size: 0.95rem;
      color: #ccc;
    }
    input, textarea {
      width: 100%;
      padding: 1rem;
      margin-bottom: 1.4rem;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #eee;
      font-family: inherit;
      font-size: 1rem;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00ff9d;
      box-shadow: 0 0 0 3px rgba(0, 255, 157, 0.18);
    }
    button {
      width: 100%;
      padding: 1.2rem;
      background: #00ff9d;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      background: #00e088;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 255, 157, 0.35);
    }
    @media (max-width: 900px) {
      .container { padding: 3rem 1.5rem; }
      form { padding: 2rem; max-width: 100%; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="container">
    <div class="hero">
      <h1>EDITING MAGIC</h1>
      <div class="subtitle">
        Professional video editing • Cinematic color grading • Motion design
      </div>

      <!-- Replace the action URL with your real Formspree endpoint -->
      <form action="https://formspree.io/f/your-unique-id-here" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required placeholder="Your name" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com" />

        <label for="message">Project details</label>
        <textarea id="message" name="message" rows="5" required placeholder="Tell me about your footage and vision..."></textarea>

        <button type="submit">Send Inquiry</button>
      </form>
    </div>
  </div>

  <div class="film-strip">
    <div class="reel">
      <div class="frame" style="background-image: url('https://images.unsplash.com/photo-1607604056989-4d9d6d8d4b9d?w=800&auto=format&fit=crop');">
        <img loading="lazy" src="https://images.unsplash.com/photo-1607604056989-4d9d6d8d4b9d?w=800&auto=format&fit=crop" alt="Cinematic scene" />
      </div>
      <div class="frame" style="background-image: url('https://images.unsplash.com/photo-1617791160505-6f00504e3519?w=800&auto=format&fit=crop');">
        <img loading="lazy" src="https://images.unsplash.com/photo-1617791160505-6f00504e3519?w=800&auto=format&fit=crop" alt="Film editing desk" />
      </div>
      <div class="frame" style="background-image: url('https://images.unsplash.com/photo-1535014496915-2c4d33630c46?w=800&auto=format&fit=crop');">
        <img loading="lazy" src="https://images.unsplash.com/photo-1535014496915-2c4d33630c46?w=800&auto=format&fit=crop" alt="Color grading monitor" />
      </div>
      <div class="frame" style="background-image: url('https://images.unsplash.com/photo-1607434472256-2d730a8e29e9?w=800&auto=format&fit=crop');">
        <img loading="lazy" src="https://images.unsplash.com/photo-1607434472256-2d730a8e29e9?w=800&auto=format&fit=crop" alt="Motion graphics setup" />
      </div>
      <div class="frame" style="background-image: url('https://images.unsplash.com/photo-1492619375914-88005aa9e5fb?w=800&auto=format&fit=crop');">
        <img loading="lazy" src="https://images.unsplash.com/photo-1492619375914-88005aa9e5fb?w=800&auto=format&fit=crop" alt="Film reel closeup" />
      </div>
    </div>
  </div>

  <script>
    // Matrix rain – Latin letters + numbers + symbols
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;

    window.addEventListener('resize', () => {
      canvas.height = window.innerHeight;
      canvas.width = window.innerWidth;
    });

    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*+-=~|".split("");
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = 'rgba(0,0,0,0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#00ff9d';
      ctx.font = `${fontSize}px monospace`;

      drops.forEach((y, i) => {
        const text = chars[Math.floor(Math.random() * chars.length)];
        const x = i * fontSize;
        ctx.fillText(text, x, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.97) {
          drops[i] = 0;
        }
        drops[i]++;
      });
    }

    setInterval(draw, 75);
  </script>
</body>
</html>
